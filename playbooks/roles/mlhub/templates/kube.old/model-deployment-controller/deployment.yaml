apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mlhub-model-deployment-controller-deployment
  name: mlhub-model-deployment-controller-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlhub-model-deployment-controller-deployment
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mlhub-model-deployment-controller-deployment
    spec:
      containers:
        - env:
            - name: RUST_LOG
              value: debug
            - name: MONGO_HOST
              value: mlhub-mongo-stateful-set-0.mlhub-mongo-headless-service.default.svc.cluster.local
            - name: MONGO_PORT
              value: "27017"
            - name: MONGO_NAME
              value: mlhub
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlhub-secrets
                  key: mongo-user-password
            - name: MONGO_USERNAME
              value: mlhub
            - name: MONGO_REPLICA_SET
              value: rs0
            - name: SHARED_DATA
              value: /srv/mlhub
            - name: RABBIT_HOST
              value: mlhub-rabbit-service
            - name: RABBIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlhub-secrets
                  key: rabbit-password
            - name: RABBIT_PORT
              value: "5672"
            - name: RABBIT_USER
              value: dev
          image: {{ mlhub_model_deployment_controller_image }}
          imagePullPolicy: Always
          name: model-deployment-controller
          resources: {}
          tty: true
          volumeMounts:
              - name: nfs-server-mount
                mountPath: /srv/mlhub/
              - name: tapis-deployment-strategies
                mountPath: /etc/mlhub/deployment-strategies.d/tapis.json
                subPath: tapis.json
      volumes:
        - name: nfs-server-mount
          nfs:
            server: '{{ NFS_SERVER_COMPONENT_IP }}'
            path: /
        - name: tapis-deployment-strategies
          configMap:
            name: tapis-deployment-strategies
      restartPolicy: Always
