apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlhub-models-api-deployment
spec:
  selector:
    matchLabels:
      app: mlhub-models-api-deployment
  template:
    metadata:
      labels:
        app: mlhub-models-api-deployment
    spec:
      containers:
        # - name: debugger
        #   image: busybox
        #   command: ["/bin/sh", "-c", "sleep infinity"]
        #   volumeMounts:
        #     - name: site-config
        #       mountPath: /etc/mlhub/site.json
        #       subPath: site.json 
        - name: models-api
          image: {{ mlhub_models_api_image }}
          imagePullPolicy: Always
          env:
            - name: MONGO_HOST
              value: "mlhub-mongo-stateful-set-0.mlhub-mongo-headless-service.**-K8S_NAMESPACE-**.svc.cluster.local"
            - name: MONGO_PORT
              value: "27017"
            - name: MONGO_NAME
              value: mlhub
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mlhub-mongo-secrets 
                  key: username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlhub-mongo-secrets 
                  key: password
            - name: MONGO_REPLICA_SET
              value: rs0
            - name: RABBIT_HOST
              value: mlhub-rabbit-service
            - name: RABBIT_PORT
              value: "5672"
            - name: RABBIT_USER
              valueFrom:
                secretKeyRef:
                  name: mlhub-rabbit-secrets 
                  key: username
            - name: RABBIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlhub-rabbit-secrets 
                  key: password
            - name: RUST_LOG
              value: debug
            - name: SHARED_DATA
              value: /srv/mlhub
            - name: CLIENT_DEPLOYMENT_STRATEGIES_DIR
              value: /etc/mlhub/deployment-strategies.d
            - name: SITE_CONFIG_PATH
              value: /etc/mlhub/site.json
          ports:
            - containerPort: 8000
              name: webserver
          # readinessProbe:
          #   httpGet:
          #     path: /models-api/health-check
          #     port: 8000
          #   initialDelaySeconds: 2
          #   periodSeconds: 15
          #   failureThreshold: 5

          resources: {}
          tty: true
          volumeMounts:
            - name: nfs-server-mount
              mountPath: /srv/mlhub/
            - name: site-config
              mountPath: /etc/mlhub/deployment-strategies.d/tapis-pods-deployment-strategies.json
              subPath: tapis-pods-deployment-strategies.json
            - name: site-config
              mountPath: /etc/mlhub/deployment-strategies.d/tapis-jobs-deployment-strategies.json
              subPath: tapis-jobs-deployment-strategies.json
            - name: site-config
              mountPath: /etc/mlhub/site.json
              subPath: site.json
      volumes:
        - name: nfs-server-mount
          nfs:
            server: "**-NFS_SERVER_COMPONENT_IP-**"
            path: /
        - name: site-config
          configMap:
            name: mlhub-site-configs