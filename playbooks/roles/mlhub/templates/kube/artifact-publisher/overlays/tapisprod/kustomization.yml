resources:
  - ../../base
  - ../../../site-configs/overlays/tapisprod

patches:
  - target:
      kind: Deployment
      name: mlhub-artifact-publisher-deployment
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mlhub-artifact-publisher-deployment
      spec:
        template:
          spec:
            containers:
              - name: artifact-publisher
                image: tapis/mlhub-artifact-publisher:26Q1
                imagePullPolicy: Always
                resources: {}