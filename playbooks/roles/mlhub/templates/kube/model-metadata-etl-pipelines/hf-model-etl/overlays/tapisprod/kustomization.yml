resources:
  - ../../base
  - ../../../../site-configs/overlays/tapisprod

secretGenerator:
  - name: mlhub-huggingface-secrets
    literals:
    - token={{ mlhub_etl_hf_token }}

patches:
  - target:
      kind: Job
      name: mlhub-hf-model-etl
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: mlhub-hf-model-etl
      spec:
        template:
          metadata:
            name: mlhub-hf-model-etl
          spec:
            restartPolicy: Never
            initContainers:
              - name: extract
                env:
                  - name: RUST_LOG
                    value: debug
                  - name: MAX_RECORDS
                    value: '5000000'
                image: tapis/mlhub-hf-model-etl-extract:26Q2.0
            containers:
              - name: hf-model-etl
                env:
                  - name: MAX_PROCESSABLE_ENTRIES
                    value: "5000000"
                  - name: MONGO_HOST
                    value: mlhub-mongo-stateful-set-0.mlhub-mongo-headless-service.tapisprod.svc.cluster.local
                image: tapis/mlhub-hf-model-etl-transform-load:26Q2.0
                imagePullPolicy: Always