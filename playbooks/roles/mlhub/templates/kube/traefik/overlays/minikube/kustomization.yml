resources:
  - ../../base
  - cr.yml
  - crb.yml
  - service-account.yml
  - dashboard-service.yml
  - web-service.yml

configMapGenerator:
- name: mlhub-traefik-dynamic-config
  behavior: replace
  files:
  - dynamic-config.yaml

patches:
  - target:
      kind: Deployment
      name: mlhub-traefik-deployment
    patch: |-
      kind: Deployment
      apiVersion: apps/v1
      metadata:
        name: mlhub-traefik-deployment
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: mlhub-traefik
        template:
          metadata:
            labels:
              app: mlhub-traefik
          spec:
            serviceAccountName: mlhub-traefik-account
            containers:
              - name: mlhub-traefik
                image: traefik:v3.2
                args:
                  - --api.insecure
                  - --providers.kubernetesingress
                  - --accesslog=true
                  - --providers.file.directory=/etc/traefik
                  - --providers.file.filename=/etc/traefik/dynamic-config.yaml
                ports:
                  - name: web
                    containerPort: 80
                  - name: dashboard
                    containerPort: 8080
                resources: {}
                volumeMounts:
                - name: dynamic-config
                  mountPath: /etc/traefik/dynamic-config.yaml
                  subPath: dynamic-config.yaml
            volumes:
            - name: dynamic-config
              configMap:
                name: mlhub-traefik-dynamic-config